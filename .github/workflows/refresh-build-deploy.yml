name: Refresh and deploy song sheets

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-and-deploy-song-sheets
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.refresh.outputs.changed }}
      commit_sha: ${{ steps.refresh.outputs.commit_sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
      - name: Checkout BSP CLI repository
        uses: actions/checkout@v4
        with:
          repository: daysm/bahai-songs
          path: bahai-songs
          ssh-key: ${{ secrets.BAHAI_SONGS_DEPLOY_KEY }}
          persist-credentials: false
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Install bsp CLI
        working-directory: bahai-songs
        run: |
          bun install --frozen-lockfile
          bun run cli:install
      - name: Refresh song sheets
        id: refresh
        env:
          BSP_CHORDPRO_DIR: ${{ github.workspace }}/src
          BSP_CONVEX_URL: ${{ secrets.BSP_CONVEX_URL }}
        run: |
          bsp sheets download --all

          if [ -z "$(git status --porcelain -- src)" ]; then
            echo "No song sheet changes to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- src
          git commit -m "Refresh song sheets"
          git push origin HEAD:${{ github.ref_name }}
          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build:
    needs: refresh
    if: needs.refresh.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.refresh.outputs.commit_sha }}
      - name: Setup Perl
        id: perl
        uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: "5.38"
      - name: Cache CPAN Modules
        uses: actions/cache@v4
        with:
          path: local
          key: perl-${{ steps.perl.outputs.perl-hash }}
      - name: Install system dependencies for chordpro
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libharfbuzz-dev
      - name: Install chordpro
        run: cpm install --show-build-log-on-failure chordpro
      - name: Install exiftool
        run: sudo apt install libimage-exiftool-perl -y
      - name: Cache md5 checksums
        uses: actions/cache@v4
        with:
          path: .md5
          key: always-restore-cache
      - name: Cache PDFs
        uses: actions/cache@v4
        with:
          path: public
          key: always-restore-cache
      - name: Make song sheets
        run: make
      - name: Make song book
        run: make songbook
      - name: Copy chordpro files
        run: make copypro
      - name: Create archive
        run: make archive
      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: song-sheet-public
          path: public
          if-no-files-found: error

  deploy:
    needs: [refresh, build]
    if: needs.refresh.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: song-sheet-public
          path: public
      - name: Install Netlify
        run: npm install netlify-cli@17.10.1 -g
      - name: Deploy to Netlify
        id: netlify_deploy
        run: |
          netlify deploy \
            --prod \
            --dir public \
            --site ${{ secrets.NETLIFY_SITE_ID }} \
            --auth ${{ secrets.NETLIFY_API_TOKEN }}
